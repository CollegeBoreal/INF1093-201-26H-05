name: Participations

on: [push]

jobs:
  presence:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git pull --rebase origin main

      - name: Use jq
        run: echo '{"name":"GitHub"}' | jq '.name'

      - name: Use PowerShell
        run: pwsh --version
    
      - shell: bash
        run: |
          # (your evaluation logic unchanged)
          cd 0.PlanDeCours && bash .scripts/run.sh && cd ..
          cd P.Programmation/1.IDE && bash .scripts/run.sh && cd ../2.Jupyter && bash .scripts/run.sh && cd ../..
          cd 2.IO && pwsh .scripts/run.ps1 && cd ..
          cd 3.Tris && pwsh .scripts/run.ps1 && cd ..
          cd 4.Hashing && pwsh .scripts/run.ps1 && cd ..
          cd 5.OOP && pwsh .scripts/run.ps1 && cd ..
          cd 8.Dijkstra && pwsh .scripts/run.ps1 && cd ..

      - name: Grade Students
        shell: pwsh
        env:
          LMS_URL: ${{ secrets.LMS_URL }}            # GitHub variable
          API_SYNC_TOKEN: ${{ secrets.API_SYNC_TOKEN }} # GitHub secret
        run: pwsh .scripts/grading/push_grades.ps1

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit -am "Vérification de la participation" || echo "No changes"

      - name: Final rebase safety
        run: |
          git pull --rebase origin main

      - name: Push changes
        run: |
          git push origin main